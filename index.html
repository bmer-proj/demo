<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dementia Caregiver Support</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <!-- Header with Home Button -->
    <nav class="main-nav" id="mainNav">
        <div class="nav-header">
            <button class="hamburger-menu" onclick="toggleMenu()">☰</button>
            <span class="nav-text">View Other People</span>
            <button class="add-person-btn" onclick="addNewPerson()">+</button>
            <span class="nav-text">Add New Profile</span>
        </div>
        <div class="menu-items">
            <ol class="breadcrumb">
            </ol>
        </div>
        <div class="notes-section">
            <button id="toggle-notes" class="toggle-notes-btn" onclick="toggleNotes()">Notes</button>
            <div id="notes-content" style="display: none;">
                <div id="notes-list"></div>
                <textarea id="new-note" placeholder="Write a new note..."></textarea>
                <button onclick="saveNote()" class="save-note-btn">Save Note</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content-wrapper">
        <section class="person-profile">
            <img src="profileimg.png" class="profile-image">
            <div class="edit-container">
                <button class="edit-btn" onclick="toggleEditImage()">Edit Image</button>
            </div>
            <button class="save-btn" onclick="saveImageChanges()" style="display: none;">Save Image</button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <div class="name-section">
            <h2>New Profile</h2>
            <div class="edit-container">
                <button class="edit-btn" onclick="toggleEditName()">Edit Name</button>
            </div>
            <input type="text" id="nameInput" style="display: none;">
            <button class="save-btn" onclick="saveNameChanges()" style="display: none;">Save Name</button>
            <h4>Relationship to individual</h4>
            <div class="edit-container">
               <button class="edit-btn" onclick="toggleEditRelationship()">Edit Relationship</button>
            </div>
            <input type="text" id="relationshipInput" style="display: none;">
            <button class="save-btn" id="relationshipSaveBtn" onclick="saveRelationshipChanges()" style="display: none;">Save Relationship</button>
            </div>
            <button class="delete-person-btn" onclick="deletePerson()">Remove Profile</button>

            <!-- Conversation Starters -->
            <div class="conversation-section">
                <h3>Conversation Ideas</h3>
                <ul class="conversations-list">
                        <button onclick="showTopic('family')" class="topic-button">
                            Talk about family
                        </button>
                        <button onclick="showTopic('food')" class="topic-button">
                            Favorite foods
                        </button>
                        <button onclick="showTopic('hobbies')" class="topic-button">
                            Hobbies and interests
                        </button>
                </ul>
            </div>

             <!-- Activity Suggestions -->
             <div class="activity-section">
                <h3>Suggested Activities</h3>
                <ul class="activities-list">
                        <button onclick="startActivity('walk')" class="activity-button">
                            Take a short walk
                        </button>
                        <button onclick="startActivity('music')" class="activity-button">
                            Listen to music
                        </button>
                        <button onclick="startActivity('photo')" class="activity-button">
                            Look at photos
                        </button>
                </ul>
            </div>
        </section>
    </main>
    <div id="note-edit-modal" class="modal"></div>
</body>
</html>
